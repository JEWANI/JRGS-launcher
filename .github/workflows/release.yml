name: Build & Release JRGS

on:
  push:
    tags:
      - 'v*'   # v1.0.0 нҳ•мӢқ нғңк·ё н‘ёмӢң мӢң мӢӨн–ү

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. мҶҢмҠӨ мІҙнҒ¬м•„мӣғ
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python м„Өм •
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. мқҳмЎҙм„ұ м„Өм№ҳ
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. PyInstaller л№Ңл“ң
      - name: Build with PyInstaller
        run: pyinstaller JRGS.spec --noconfirm

      # 5. нҸ¬н„°лё” ZIP мғқм„ұ
      - name: Create portable ZIP
        run: |
          # нҸ¬н•Ё нҸҙлҚ” ліөмӮ¬
          Copy-Item -Recurse fonts     dist\JRGS\fonts     -Force
          Copy-Item -Recurse ICON      dist\JRGS\ICON      -Force
          Copy-Item -Recurse Emulators dist\JRGS\Emulators -Force
          Copy-Item CHANGELOG.md       dist\JRGS\          -Force
          Copy-Item README.md          dist\JRGS\          -Force

          # мӮ¬мҡ©мһҗ лҚ°мқҙн„° нҸҙлҚ” мғқм„ұ
          New-Item -ItemType Directory -Force -Path dist\JRGS\ROM_File
          New-Item -ItemType Directory -Force -Path dist\JRGS\GameData
          New-Item -ItemType Directory -Force -Path dist\JRGS\Screenshots
          New-Item -ItemType Directory -Force -Path dist\JRGS\Records

          # ZIP м••м¶•
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path dist\JRGS\* -DestinationPath "JRGS_${tag}_portable.zip"
        shell: pwsh

      # 6. Inno Setup м„Өм№ҳ
      - name: Install Inno Setup
        run: choco install innosetup --yes
        shell: pwsh

      # 7. мқёмҠӨнҶЁлҹ¬ л№Ңл“ң
      - name: Build installer
        run: |
          $tag = "${{ github.ref_name }}"
          # installer.issмқҳ OutputBaseFilenameм—җ лІ„м „ л°ҳмҳҒ
          (Get-Content installer.iss) -replace 'MyAppVersion   "1.0.0"', "MyAppVersion   `"${tag.TrimStart('v')}`"" | Set-Content installer.iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          # output нҸҙлҚ”м—җм„ң мөңмў… нҢҢмқјлӘ… ліҖкІҪ
          $setupFile = Get-ChildItem output\*.exe | Select-Object -First 1
          Rename-Item $setupFile.FullName "JRGS_${tag}_setup.exe"
        shell: pwsh

      # 8. GitHub Releasesм—җ м—…лЎңл“ң
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JRGS ${{ github.ref_name }}"
          body: |
            ## мһ¬мҷҖлӢҲмқҳ л ҲнҠёлЎң кІҢмһ„ ліҙкҙҖмҶҢ ${{ github.ref_name }}

            ### лӢӨмҡҙлЎңл“ң
            | нҢҢмқј | м„ӨлӘ… |
            |------|------|
            | `JRGS_${{ github.ref_name }}_portable.zip` | нҸ¬н„°лё” лІ„м „ вҖ” м••м¶• н•ҙм ң нӣ„ л°”лЎң мӢӨн–ү |
            | `JRGS_${{ github.ref_name }}_setup.exe` | м„Өм№ҳ лІ„м „ вҖ” мқёмҠӨнҶЁлҹ¬ мӢӨн–ү |

            ### ліҖкІҪ мӮ¬н•ӯ
            CHANGELOG.mdлҘј м°ёкі н•ҙмЈјм„ёмҡ”.
          files: |
            JRGS_${{ github.ref_name }}_portable.zip
            output/JRGS_${{ github.ref_name }}_setup.exe
          draft: false
          prerelease: false
