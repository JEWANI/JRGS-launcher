name: Build & Release JRGS

on:
  push:
    tags:
      - 'v*'   # v1.0.0 형식 태그 푸시 시 실행

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 소스 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 의존성 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. PyInstaller 빌드
      - name: Build with PyInstaller
        run: pyinstaller JRGS.spec --noconfirm

      # 5. 포터블 ZIP 생성
      - name: Create portable ZIP
        run: |
          # 포함 폴더 복사
          Copy-Item -Recurse fonts     dist\JRGS\fonts     -Force
          Copy-Item -Recurse ICON      dist\JRGS\ICON      -Force
          Copy-Item -Recurse Emulators dist\JRGS\Emulators -Force

          # Emulators 폴더 내 ZIP 파일 자동 압축 해제 후 삭제
          Get-ChildItem -Path dist\JRGS\Emulators -Recurse -Filter *.zip | ForEach-Object {
            Expand-Archive -Path $_.FullName -DestinationPath $_.DirectoryName -Force
            Remove-Item $_.FullName
          }

          # 사용자 데이터 폴더 생성
          New-Item -ItemType Directory -Force -Path dist\JRGS\ROM_File
          New-Item -ItemType Directory -Force -Path dist\JRGS\GameData
          New-Item -ItemType Directory -Force -Path dist\JRGS\Screenshots
          New-Item -ItemType Directory -Force -Path dist\JRGS\Records

          # ZIP 압축
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path dist\JRGS\* -DestinationPath "JRGS_${tag}_portable.zip"
        shell: pwsh

      # 6. Inno Setup 설치
      - name: Install Inno Setup
        run: choco install innosetup --yes
        shell: pwsh

      # 7. 인스톨러 빌드
      - name: Build installer
        run: |
          $tag = "${{ github.ref_name }}"
          # installer.iss의 OutputBaseFilename에 버전 반영
          (Get-Content installer.iss) -replace 'MyAppVersion   "1.0.0"', "MyAppVersion   `"${tag.TrimStart('v')}`"" | Set-Content installer.iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          # output 폴더에서 최종 파일명 변경
          $setupFile = Get-ChildItem output\*.exe | Select-Object -First 1
          Rename-Item $setupFile.FullName "JRGS_${tag}_setup.exe"
        shell: pwsh

      # 8. GitHub Releases에 업로드
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JRGS ${{ github.ref_name }}"
          body: |
            ## 재와니의 레트로 게임 보관소 ${{ github.ref_name }}

            ### 다운로드
            | 파일 | 설명 |
            |------|------|
            | `JRGS_${{ github.ref_name }}_portable.zip` | 포터블 버전 — 압축 해제 후 바로 실행 |
            | `JRGS_${{ github.ref_name }}_setup.exe` | 설치 버전 — 인스톨러 실행 |

            ### 변경 사항
            CHANGELOG.md를 참고해주세요.
          files: |
            JRGS_${{ github.ref_name }}_portable.zip
            output/JRGS_${{ github.ref_name }}_setup.exe
          draft: false
          prerelease: false
