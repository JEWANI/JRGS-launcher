name: Build & Release JRGS

on:
  push:
    tags:
      - 'v*'   # v1.0.0 형식 태그 푸시 시 실행

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 소스 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 의존성 설치 (일반)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. PyInstaller 빌드 (일반)
      - name: Build with PyInstaller
        run: pyinstaller JRGS.spec --noconfirm

      # 4-1. 최소 버전 의존성 설치 및 빌드
      - name: Install lite dependencies & build
        run: |
          pip uninstall PyQt6-WebEngine PyQt6-WebEngineCore PyQt6-WebEngineWidgets -y
          pip install -r requirements_lite.txt
          pyinstaller JRGS_lite.spec --noconfirm

      # 5. 포터블 ZIP 생성 (일반 + 최소)
      - name: Create portable ZIPs
        run: |
          $tag = "${{ github.ref_name }}"

          # 공통 폴더 복사 함수
          function Copy-Common($dist) {
            Copy-Item -Recurse fonts     "$dist\fonts"     -Force
            Copy-Item -Recurse ICON      "$dist\ICON"      -Force
            Copy-Item -Recurse Emulators "$dist\Emulators" -Force
            Get-ChildItem -Path "$dist\Emulators" -Recurse -File | Where-Object { $_.Extension -eq '.zip' } | ForEach-Object {
              Expand-Archive -Path $_.FullName -DestinationPath $_.DirectoryName -Force
              Remove-Item $_.FullName
            }
            Get-ChildItem -Path "$dist\Emulators" -Recurse -File | Where-Object { $_.Extension -eq '.7z' } | Remove-Item -Force
            New-Item -ItemType Directory -Force -Path "$dist\ROM_File"
            New-Item -ItemType Directory -Force -Path "$dist\GameData"
            New-Item -ItemType Directory -Force -Path "$dist\Screenshots"
            New-Item -ItemType Directory -Force -Path "$dist\Records"
          }

          Copy-Common "dist\JRGS"
          Compress-Archive -Path dist\JRGS\* -DestinationPath "JRGS_${tag}_portable.zip"

          Copy-Common "dist\JRGS_lite"
          Compress-Archive -Path dist\JRGS_lite\* -DestinationPath "JRGS_${tag}_lite_portable.zip"
        shell: pwsh

      # 6. Inno Setup 설치
      - name: Install Inno Setup
        run: choco install innosetup --yes
        shell: pwsh

      # 7. 인스톨러 빌드 (일반 + 최소)
      - name: Build installer
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')

          # 일반 버전
          (Get-Content installer.iss) -replace 'MyAppVersion   "1.0.0"', "MyAppVersion   `"$ver`"" | Set-Content installer.iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          $setupFile = Get-ChildItem output\*.exe | Select-Object -First 1
          Rename-Item $setupFile.FullName "JRGS_${tag}_setup.exe"

          # 최소 버전
          (Get-Content installer_lite.iss) -replace 'MyAppVersion   "1.0.0"', "MyAppVersion   `"$ver`"" | Set-Content installer_lite.iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_lite.iss
          $setupFile = Get-ChildItem output\*_lite_setup*.exe | Select-Object -First 1
          Rename-Item $setupFile.FullName "JRGS_${tag}_lite_setup.exe"
        shell: pwsh

      # 8. GitHub Releases에 업로드
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JRGS ${{ github.ref_name }}"
          body: |
            ## 재와니의 레트로 게임 보관소 ${{ github.ref_name }}

            ### 다운로드
            | 파일 | 설명 |
            |------|------|
            | `JRGS_${{ github.ref_name }}_portable.zip` | 일반 포터블 — 유튜브 인앱 재생 지원 |
            | `JRGS_${{ github.ref_name }}_setup.exe` | 일반 설치 버전 — 유튜브 인앱 재생 지원 |
            | `JRGS_${{ github.ref_name }}_lite_portable.zip` | 최소 포터블 — 용량 절감 버전 |
            | `JRGS_${{ github.ref_name }}_lite_setup.exe` | 최소 설치 버전 — 용량 절감 버전 |

            ### 변경 사항
            CHANGELOG.md를 참고해주세요.
          files: |
            JRGS_${{ github.ref_name }}_portable.zip
            JRGS_${{ github.ref_name }}_lite_portable.zip
            output/JRGS_${{ github.ref_name }}_setup.exe
            output/JRGS_${{ github.ref_name }}_lite_setup.exe
          draft: false
          prerelease: false
